name: Supabase Deploy

# Pusht neue Migrationen + Edge Functions automatisch in das verlinkte
# Supabase-Projekt bei jedem Push auf main, der supabase/-Dateien
# geändert hat.
#
# Voraussetzungen (einmaliges Setup):
#   Repo Settings → Secrets and variables → Actions → New repository secret
#     - SUPABASE_ACCESS_TOKEN — Personal Access Token aus
#       https://supabase.com/dashboard/account/tokens
#     - SUPABASE_DB_PASSWORD — DB-Passwort aus
#       Project Settings → Database → Database password
#
# Solange diese Secrets fehlen, überspringt der Workflow den Deploy
# mit einer Warning (kein Failure-Mail).

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - "supabase/functions/**"
      - "supabase/config.toml"
  workflow_dispatch: {}

concurrency:
  group: supabase-deploy
  cancel-in-progress: false

env:
  SUPABASE_PROJECT_REF: dsgenkjlkdzkoplnxebg

jobs:
  deploy:
    name: db push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Secrets vorhanden
        id: secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::warning title=Supabase-Secrets fehlen::Setze SUPABASE_ACCESS_TOKEN und SUPABASE_DB_PASSWORD in Repo Settings → Secrets, um Auto-Deploy zu aktivieren. Siehe docs/SUPABASE_SETUP.md Schritt 6. Workflow wird übersprungen, kein Failure."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Supabase CLI
        if: steps.secrets.outputs.skip != 'true'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Project
        if: steps.secrets.outputs.skip != 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_REF" \
            --password "${{ secrets.SUPABASE_DB_PASSWORD }}"

      - name: Deploy Migrations
        if: steps.secrets.outputs.skip != 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase db push --password "${{ secrets.SUPABASE_DB_PASSWORD }}" --include-all

      - name: Deploy Edge Functions
        if: steps.secrets.outputs.skip != 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          # User-JWT erforderlich (Mandanten-Daten)
          supabase functions deploy generate-strategie
          supabase functions deploy triage-inbox
          supabase functions deploy analyze-document
          supabase functions deploy generate-mahnung
          supabase functions deploy import-data
          # öffentlich (Marketing-Forms / Onboarding ohne Login)
          supabase functions deploy capture-lead --no-verify-jwt
          supabase functions deploy create-tenant --no-verify-jwt
          # Webhook-Receiver (HMAC-secured, no JWT)
          supabase functions deploy webhook-vapi --no-verify-jwt
          supabase functions deploy webhook-whatsapp --no-verify-jwt
          supabase functions deploy webhook-email --no-verify-jwt

      - name: Summary
        if: steps.secrets.outputs.skip != 'true'
        run: |
          echo "::notice title=Supabase deployed::Migrations + Edge Functions applied to ${SUPABASE_PROJECT_REF}"

      - name: Skipped Notice
        if: steps.secrets.outputs.skip == 'true'
        run: |
          echo "::notice title=Supabase Deploy übersprungen::Secrets nicht gesetzt — siehe docs/SUPABASE_SETUP.md Schritt 6."
