project_id = "dsgenkjlkdzkoplnxebg"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1:54321"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:5173"
additional_redirect_urls = [
  "http://127.0.0.1:5173",
  "http://localhost:5173",
  "http://127.0.0.1:5173/auth/callback",
  "http://localhost:5173/auth/callback",
]
jwt_expiry = 3600
enable_signup = false  # Wir nutzen Magic Links + manuelles Onboarding (Tenant erstellt User)
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = false
double_confirm_changes = true
enable_confirmations = false  # Magic Link reicht

[edge_functions]
enabled = true

[analytics]
enabled = false
